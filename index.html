<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bollimon | Kurumsal Giriş</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(12px); }
        input, select { background: #1e293b !important; border: 2px solid #334155 !important; color: #fbbf24 !important; border-radius: 16px; padding: 14px; font-weight: 800; width: 100%; text-align: center; outline: none; }
        .hidden { display: none; }
        .report-table th { color: #64748b; font-size: 10px; text-transform: uppercase; padding: 12px 8px; border-bottom: 1px solid #334155; }
        .report-table td { padding: 14px 8px; font-size: 14px; font-weight: 700; border-bottom: 1px solid #1e293b; }
    </style>
</head>
<body class="p-4 pb-24">

    <!-- GİRİŞ EKRANI -->
    <div id="login-screen" class="max-w-md mx-auto mt-20 text-center">
        <h1 class="text-5xl font-black text-yellow-400 italic mb-2">BOLLİMON</h1>
        <p class="text-xs text-slate-500 font-bold uppercase tracking-widest mb-10">Şube Yönetim Portalı</p>
        
        <div class="glass p-8 rounded-[2.5rem] space-y-6">
            <div>
                <label class="text-[10px] font-bold text-slate-400 block mb-2 uppercase">Şube Seçiniz</label>
                <select id="sube-secim">
                    <option value="Sakarya">Sakarya Şubesi</option>
                    <option value="İzmit">İzmit Şubesi</option>
                    <option value="Merkez">Merkez Şubesi</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 block mb-2 uppercase">Giriş Şifresi</label>
                <input type="password" id="giris-sifre" placeholder="****">
            </div>
            <button onclick="girisYap()" class="w-full bg-yellow-400 text-slate-900 font-black py-4 rounded-2xl shadow-xl shadow-yellow-400/20 active:scale-95 transition">SİSTEME GİRİŞ YAP</button>
        </div>
    </div>

    <!-- ANA PANEL (Girişten Sonra Görünür) -->
    <div id="main-panel" class="hidden max-w-md mx-auto">
        <!-- Başlık -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 id="panel-sube-adi" class="text-2xl font-black text-white italic tracking-tighter">ŞUBE ADI</h1>
                <p class="text-[10px] text-yellow-400 font-bold uppercase">Dijital Denetim Sistemi</p>
            </div>
            <button onclick="location.reload()" class="bg-slate-800 p-2 rounded-full">🔓</button>
        </div>

        <!-- Stok Durumu -->
        <div class="glass p-6 rounded-[2rem] mb-6 border-b-4 border-yellow-500">
            <div class="grid grid-cols-2 gap-8">
                <div class="text-center">
                    <span class="text-[9px] font-bold text-yellow-500 uppercase tracking-widest">Acısız</span>
                    <p class="text-2xl font-black text-white" id="cur_as">0</p>
                    <p class="text-[10px] text-slate-500 font-bold" id="cur_as_k">0 Koli</p>
                </div>
                <div class="text-center border-l border-slate-700">
                    <span class="text-[9px] font-bold text-red-500 uppercase tracking-widest">Acılı</span>
                    <p class="text-2xl font-black text-white" id="cur_al">0</p>
                    <p class="text-[10px] text-slate-500 font-bold" id="cur_al_k">0 Koli</p>
                </div>
            </div>
        </div>

        <!-- Sevkiyat -->
        <div class="glass p-6 rounded-[2rem] mb-6">
            <h2 class="text-xs font-black text-blue-400 mb-4 uppercase">🚚 Sevkiyat Girişi</h2>
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="s_as_k" placeholder="Acısız Koli">
                <input type="number" id="s_al_k" placeholder="Acılı Koli">
            </div>
            <button onclick="sevkiyatEkle()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl mt-4 active:scale-95 transition">STOKA EKLE</button>
        </div>

        <!-- Sayım Alanı -->
        <div class="glass p-6 rounded-[2rem] mb-6 border-t-4 border-yellow-500">
            <h2 class="text-xs font-black text-yellow-400 mb-6 uppercase tracking-widest text-center">📉 Akşam Sayımı</h2>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-3"><input type="number" id="t_ac_as" oninput="guncelle()" placeholder="As. Açılan Kg"><input type="number" id="t_ka_as" oninput="guncelle()" placeholder="As. Kalan Kg"></div>
                <div class="grid grid-cols-2 gap-3"><input type="number" id="t_ac_al" oninput="guncelle()" placeholder="Al. Açılan Kg"><input type="number" id="t_ka_al" oninput="guncelle()" placeholder="Al. Kalan Kg"></div>
                <div class="grid grid-cols-2 gap-3"><input type="number" id="v_ka_as_koli" oninput="guncelle()" placeholder="As. Kalan Koli"><input type="number" id="v_ka_al_koli" oninput="guncelle()" placeholder="Al. Kalan Koli"></div>
            </div>
        </div>

        <!-- SS ALANI -->
        <div id="capture-area" class="p-6 rounded-[2.5rem] bg-slate-900 border border-white/10 shadow-2xl relative overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h3 class="text-xl font-black text-white italic tracking-tighter">BOLLİMON</h3>
                    <p id="r-sube" class="text-[9px] text-yellow-400 font-bold tracking-widest uppercase"></p>
                </div>
                <p id="r-tarih" class="text-[9px] text-slate-500 font-bold"></p>
            </div>
            <table class="w-full report-table text-left mb-6">
                <thead><tr><th>ÜRÜN</th><th class="text-center">AÇ.</th><th class="text-center">SAT.</th><th class="text-right">KAL.</th></tr></thead>
                <tbody id="tablo-vucut"></tbody>
            </table>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white/5 p-3 rounded-2xl border border-white/5 text-center"><p class="text-[8px] text-slate-500 uppercase">Acısız Depo</p><p id="alt-as" class="text-xs font-black text-white">0</p></div>
                <div class="bg-white/5 p-3 rounded-2xl border border-white/5 text-center"><p class="text-[8px] text-slate-500 uppercase">Acılı Depo</p><p id="alt-al" class="text-xs font-black text-white">0</p></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mt-6">
            <button onclick="fotoCek()" class="bg-yellow-400 text-slate-900 font-black py-5 rounded-2xl active:scale-95 transition">📸 RAPOR ÇEK</button>
            <button onclick="gunuKapat()" class="bg-slate-800 text-white font-black py-5 rounded-2xl active:scale-95 transition">🌙 GÜNÜ KAPAT</button>
        </div>
    </div>

    <script>
        let storageKey = "bollimon_sube_data";
        let db = {};
        let seciliSube = "";

        function girisYap() {
            const sifre = document.getElementById('giris-sifre').value;
            if(sifre === "1234") {
                seciliSube = document.getElementById('sube-secim').value;
                storageKey = "bollimon_" + seciliSube;
                db = JSON.parse(localStorage.getItem(storageKey)) || { as: 0, al: 0 };
                
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-panel').classList.remove('hidden');
                document.getElementById('panel-sube-adi').innerText = seciliSube + " ŞUBESİ";
                document.getElementById('r-sube').innerText = seciliSube + " Şubesi Raporu";
                document.getElementById('r-tarih').innerText = new Date().toLocaleDateString('tr-TR');
                
                arayuzGuncelle();
            } else {
                alert("Hatalı şifre!");
            }
        }

        function sevkiyatEkle() {
            db.as += (parseFloat(document.getElementById('s_as_k').value) || 0) * 8;
            db.al += (parseFloat(document.getElementById('s_al_k').value) || 0) * 8;
            save();
            document.getElementById('s_as_k').value = "";
            document.getElementById('s_al_k').value = "";
            arayuzGuncelle();
        }

        function arayuzGuncelle() {
            document.getElementById('cur_as').innerText = db.as;
            document.getElementById('cur_as_k').innerText = (db.as / 8).toFixed(1) + " Koli";
            document.getElementById('cur_al').innerText = db.al;
            document.getElementById('cur_al_k').innerText = (db.al / 8).toFixed(1) + " Koli";
            guncelle();
        }

        function guncelle() {
            const get = id => parseFloat(document.getElementById(id).value) || 0;
            let s_t_as = Math.max(0, get('t_ac_as') - get('t_ka_as'));
            let s_t_al = Math.max(0, get('t_ac_al') - get('t_ka_al'));
            let k_v_as = get('v_ka_as_koli') * 8;
            let k_v_al = get('v_ka_al_koli') * 8;
            let s_v_as = Math.max(0, db.as - k_v_as);
            let s_v_al = Math.max(0, db.al - k_v_al);

            document.getElementById('tablo-vucut').innerHTML = `
                <tr><td>Acısız T.</td><td class="text-center text-yellow-500">${get('t_ac_as')}kg</td><td class="text-center">${s_t_as}kg</td><td class="text-right text-slate-500">${get('t_ka_as')}kg</td></tr>
                <tr><td>Acılı T.</td><td class="text-center text-red-500">${get('t_ac_al')}kg</td><td class="text-center">${s_t_al}kg</td><td class="text-right text-slate-500">${get('t_ka_al')}kg</td></tr>
                <tr><td>Acısız V.</td><td class="text-center text-yellow-500">${s_v_as}Ad</td><td class="text-center">${s_v_as}Ad</td><td class="text-right text-slate-500">0Ad</td></tr>
                <tr><td>Acılı V.</td><td class="text-center text-red-500">${s_v_al}Ad</td><td class="text-center">${s_v_al}Ad</td><td class="text-right text-slate-500">0Ad</td></tr>
            `;
            document.getElementById('alt-as').innerText = get('v_ka_as_koli') + " Koli";
            document.getElementById('alt-al').innerText = get('v_ka_al_koli') + " Koli";
            window.temp_db = { as: k_v_as, al: k_v_al };
        }

        function fotoCek() {
            html2canvas(document.getElementById('capture-area'), { backgroundColor: '#0f172a', scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Bollimon_${seciliSube}_${new Date().toLocaleDateString()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function gunuKapat() {
            if(confirm("Günü kapatıyorsunuz?")) {
                db = { ...window.temp_db };
                save();
                location.reload();
            }
        }

        function save() { localStorage.setItem(storageKey, JSON.stringify(db)); }
    </script>
</body>
</html>
