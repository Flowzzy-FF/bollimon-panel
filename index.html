<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bollimon | Kurumsal Giriş</title>
    <!-- Tasarımı doğrudan içeri gömdüm (İnternet gitse de bozulmaz) -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; padding: 16px; line-height: 1.5; }
        
        .max-w-md { max-width: 448px; margin: 0 auto; }
        .glass { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(12px); border-radius: 2rem; padding: 24px; margin-bottom: 24px; }
        
        h1 { font-style: italic; font-weight: 900; color: #fbbf24; letter-spacing: -0.05em; }
        .text-center { text-align: center; }
        .hidden { display: none; }
        
        input, select { 
            background: #1e293b; border: 2px solid #334155; color: #fbbf24; border-radius: 16px; 
            padding: 14px; font-weight: 800; width: 100%; text-align: center; outline: none; margin-bottom: 10px;
        }
        input:focus { border-color: #fbbf24; }
        
        button { 
            width: 100%; font-weight: 800; border-radius: 16px; cursor: pointer; border: none; 
            padding: 16px; transition: transform 0.1s; margin-top: 10px;
        }
        button:active { transform: scale(0.95); }
        .btn-yellow { background: #fbbf24; color: #0f172a; }
        .btn-blue { background: #2563eb; color: white; }
        .btn-slate { background: #334155; color: white; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stok-card { text-align: center; }
        .stxt-title { font-size: 10px; text-transform: uppercase; font-weight: 700; color: #94a3b8; }
        .stxt-val { font-size: 24px; font-weight: 900; }
        
        table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 13px; }
        th { color: #64748b; font-size: 10px; text-transform: uppercase; text-align: left; padding: 8px; border-bottom: 1px solid #334155; }
        td { padding: 12px 8px; font-weight: 700; border-bottom: 1px solid #1e293b; }
        
        #capture-area { background: #0f172a; border: 1px solid #334155; padding: 20px; border-radius: 2rem; position: relative; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <!-- GİRİŞ EKRANI -->
    <div id="login-screen" class="max-w-md" style="margin-top: 60px;">
        <div class="text-center">
            <h1 style="font-size: 40px;">BOLLİMON</h1>
            <p style="font-size: 10px; color:#64748b; font-weight:bold; letter-spacing: 2px; margin-bottom: 40px;">ŞUBE PORTALI</p>
        </div>
        <div class="glass">
            <label style="font-size: 10px; font-weight:bold; color:#94a3b8; display:block; margin-bottom: 8px;">ŞUBE SEÇİNİZ</label>
            <select id="sube-secim">
                <option value="Sakarya">Sakarya Şubesi</option>
                <option value="İzmit">İzmit Şubesi</option>
                <option value="Merkez">Merkez Şubesi</option>
            </select>
            <label style="font-size: 10px; font-weight:bold; color:#94a3b8; display:block; margin-bottom: 8px;">ŞİFRE</label>
            <input type="password" id="giris-sifre" placeholder="****">
            <button onclick="girisYap()" class="btn-yellow">SİSTEME GİRİŞ YAP</button>
        </div>
    </div>

    <!-- ANA PANEL -->
    <div id="main-panel" class="max-w-md hidden">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 id="panel-sube-adi" style="font-size: 24px;">ŞUBE ADI</h1>
            <button onclick="location.reload()" style="width: auto; padding: 8px 12px; margin:0;" class="btn-slate">🔒</button>
        </div>

        <div class="glass" style="border-bottom: 4px solid #fbbf24;">
            <div class="grid">
                <div class="stok-card">
                    <p class="stxt-title" style="color:#fbbf24;">Acısız</p>
                    <p class="stxt-val" id="cur_as">0</p>
                    <p style="font-size:10px; color:#64748b;" id="cur_as_k">0 Koli</p>
                </div>
                <div class="stok-card" style="border-left: 1px solid #334155;">
                    <p class="stxt-title" style="color:#ef4444;">Acılı</p>
                    <p class="stxt-val" id="cur_al">0</p>
                    <p style="font-size:10px; color:#64748b;" id="cur_al_k">0 Koli</p>
                </div>
            </div>
        </div>

        <div class="glass">
            <h2 style="font-size:12px; color:#3b82f6; margin-bottom:15px;">🚚 SEVKİYAT GİRİŞİ</h2>
            <div class="grid">
                <input type="number" id="s_as_k" placeholder="Acısız Koli">
                <input type="number" id="s_al_k" placeholder="Acılı Koli">
            </div>
            <button onclick="sevkiyatEkle()" class="btn-blue">STOKA EKLE</button>
        </div>

        <div class="glass" style="border-top: 4px solid #fbbf24;">
            <h2 style="font-size:12px; color:#fbbf24; text-align:center; margin-bottom:15px;">📉 AKŞAM SAYIMI</h2>
            <div class="grid"><input type="number" id="t_ac_as" oninput="guncelle()" placeholder="As. Açılan"><input type="number" id="t_ka_as" oninput="guncelle()" placeholder="As. Kalan"></div>
            <div class="grid"><input type="number" id="t_ac_al" oninput="guncelle()" placeholder="Al. Açılan"><input type="number" id="t_ka_al" oninput="guncelle()" placeholder="Al. Kalan"></div>
            <div class="grid"><input type="number" id="v_ka_as_koli" oninput="guncelle()" placeholder="As. Kalan Koli"><input type="number" id="v_ka_al_koli" oninput="guncelle()" placeholder="Al. Kalan Koli"></div>
        </div>

        <div id="capture-area">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <div><h3 style="color:white; font-style:italic;">BOLLİMON</h3><p id="r-sube" style="font-size:9px; color:#fbbf24;"></p></div>
                <p id="r-tarih" style="font-size:9px; color:#64748b; font-weight:bold;"></p>
            </div>
            <table>
                <thead><tr><th>ÜRÜN</th><th style="text-align:center;">AÇ.</th><th style="text-align:center;">SAT.</th><th style="text-align:right;">KAL.</th></tr></thead>
                <tbody id="tablo-vucut" style="color:white;"></tbody>
            </table>
            <div class="grid">
                <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:12px; text-align:center;">
                    <p style="font-size:8px; color:#64748b;">ACISIZ DEPO</p><p id="alt-as" style="font-size:12px; color:white; font-weight:bold;"></p>
                </div>
                <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:12px; text-align:center;">
                    <p style="font-size:8px; color:#64748b;">ACILI DEPO</p><p id="alt-al" style="font-size:12px; color:white; font-weight:bold;"></p>
                </div>
            </div>
        </div>

        <div class="grid" style="margin-top:20px;">
            <button onclick="fotoCek()" class="btn-yellow">📸 RAPOR ÇEK</button>
            <button onclick="gunuKapat()" class="btn-slate">🌙 GÜNÜ KAPAT</button>
        </div>
    </div>

    <script>
        let storageKey = "bollimon_sube_data";
        let db = {};
        let seciliSube = "";

        function girisYap() {
            const sifre = document.getElementById('giris-sifre').value;
            if(sifre === "1234") {
                seciliSube = document.getElementById('sube-secim').value;
                storageKey = "bollimon_" + seciliSube;
                db = JSON.parse(localStorage.getItem(storageKey)) || { as: 0, al: 0 };
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-panel').classList.remove('hidden');
                document.getElementById('panel-sube-adi').innerText = seciliSube + " ŞUBESİ";
                document.getElementById('r-sube').innerText = seciliSube + " Şubesi Raporu";
                document.getElementById('r-tarih').innerText = new Date().toLocaleDateString('tr-TR');
                arayuzGuncelle();
            } else { alert("Hatalı şifre!"); }
        }

        function sevkiyatEkle() {
            db.as += (parseFloat(document.getElementById('s_as_k').value) || 0) * 8;
            db.al += (parseFloat(document.getElementById('s_al_k').value) || 0) * 8;
            localStorage.setItem(storageKey, JSON.stringify(db));
            document.getElementById('s_as_k').value = "";
            document.getElementById('s_al_k').value = "";
            arayuzGuncelle();
        }

        function arayuzGuncelle() {
            document.getElementById('cur_as').innerText = db.as;
            document.getElementById('cur_as_k').innerText = (db.as / 8).toFixed(1) + " Koli";
            document.getElementById('cur_al').innerText = db.al;
            document.getElementById('cur_al_k').innerText = (db.al / 8).toFixed(1) + " Koli";
            guncelle();
        }

        function guncelle() {
            const get = id => parseFloat(document.getElementById(id).value) || 0;
            let s_t_as = Math.max(0, get('t_ac_as') - get('t_ka_as'));
            let s_t_al = Math.max(0, get('t_ac_al') - get('t_ka_al'));
            let k_v_as = get('v_ka_as_koli') * 8;
            let k_v_al = get('v_ka_al_koli') * 8;
            let s_v_as = Math.max(0, db.as - k_v_as);
            let s_v_al = Math.max(0, db.al - k_v_al);

            document.getElementById('tablo-vucut').innerHTML = `
                <tr><td>Acısız T.</td><td style="text-align:center; color:#fbbf24;">${get('t_ac_as')}kg</td><td style="text-align:center;">${s_t_as}kg</td><td style="text-align:right; color:#94a3b8;">${get('t_ka_as')}kg</td></tr>
                <tr><td>Acılı T.</td><td style="text-align:center; color:#ef4444;">${get('t_ac_al')}kg</td><td style="text-align:center;">${s_t_al}kg</td><td style="text-align:right; color:#94a3b8;">${get('t_ka_al')}kg</td></tr>
                <tr><td>Acısız V.</td><td style="text-align:center; color:#fbbf24;">${s_v_as}Ad</td><td style="text-align:center;">${s_v_as}Ad</td><td style="text-align:right; color:#94a3b8;">0Ad</td></tr>
                <tr><td>Acılı V.</td><td style="text-align:center; color:#ef4444;">${s_v_al}Ad</td><td style="text-align:center;">${s_v_al}Ad</td><td style="text-align:right; color:#94a3b8;">0Ad</td></tr>
            `;
            document.getElementById('alt-as').innerText = get('v_ka_as_koli') + " Koli";
            document.getElementById('alt-al').innerText = get('v_ka_al_koli') + " Koli";
            window.temp_db = { as: k_v_as, al: k_v_al };
        }

        function fotoCek() {
            html2canvas(document.getElementById('capture-area'), { backgroundColor: '#0f172a', scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Bollimon_${seciliSube}_${new Date().toLocaleDateString()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function gunuKapat() {
            if(confirm("Günü kapatıyorsunuz?")) {
                localStorage.setItem(storageKey, JSON.stringify(window.temp_db));
                location.reload();
            }
        }
    </script>
</body>
</html>
