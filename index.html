<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bollimon | Kurumsal Giriş</title>
    <!-- CSS Dosyasını Çağırıyoruz -->
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <!-- GİRİŞ EKRANI -->
    <div id="login-screen" class="max-w-md" style="margin-top: 60px;">
        <div class="text-center">
            <h1 style="font-size: 40px;">BOLLİMON</h1>
            <p style="font-size: 10px; color:#64748b; font-weight:bold; letter-spacing: 2px; margin-bottom: 40px;">ŞUBE PORTALI</p>
        </div>
        <div class="glass">
            <label style="font-size: 10px; font-weight:bold; color:#94a3b8; display:block; margin-bottom: 8px;">ŞUBE SEÇİNİZ</label>
            <select id="sube-secim">
                <option value="Sakarya">Sakarya Şubesi</option>
                <option value="İzmit">İzmit Şubesi</option>
                <option value="Merkez">Merkez Şubesi</option>
            </select>
            <label style="font-size: 10px; font-weight:bold; color:#94a3b8; display:block; margin-bottom: 8px;">ŞİFRE</label>
            <input type="password" id="giris-sifre" placeholder="****">
            <button onclick="girisYap()" class="btn-yellow">SİSTEME GİRİŞ YAP</button>
        </div>
    </div>

    <!-- ANA PANEL (Buradaki HTML yapısı aynı kalıyor) -->
    <div id="main-panel" class="max-w-md hidden">
        <!-- Panel içeriği buraya gelecek (v14.1 sürümündeki panel kısmını aynen koyabilirsin) -->
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 id="panel-sube-adi" style="font-size: 24px;">ŞUBE ADI</h1>
            <button onclick="location.reload()" style="width: auto; padding: 8px 12px; margin:0;" class="btn-slate">🔒</button>
        </div>
        <!-- ... geri kalan panel HTML kodları ... -->
    </div>

    <!-- JS Dosyasını Çağırıyoruz -->
    <script src="script.js"></script>
</body>
</html>
