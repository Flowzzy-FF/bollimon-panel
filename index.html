<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bollimon | Yönetim</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #fff; padding: 20px; }
        .max-w { max-width: 450px; margin: 0 auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 15px; border-radius: 12px; border: none; margin: 5px 0; font-weight: bold; }
        button { background: #fbbf24; cursor: pointer; }
        .hidden { display: none; }
        .stok-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<div id="login" class="max-w card">
    <h1>BOLLİMON</h1>
    <select id="sube-secim"><option value="Sakarya">Sakarya</option></select>
    <input type="password" id="sifre" placeholder="Şifre (1234)">
    <button onclick="giris()">GİRİŞ</button>
</div>

<div id="panel" class="max-w hidden">
    <div class="card">
        <h2 id="baslik">ŞUBE PANELİ</h2>
        <div class="stok-grid">
            <div><p>Acısız (Kg)</p><input type="number" id="as_stok" value="0"></div>
            <div><p>Acılı (Kg)</p><input type="number" id="al_stok" value="0"></div>
        </div>
        <button onclick="kaydet()">STOKU GÜNCELLE</button>
    </div>
</div>

<script>
    function giris() {
        if(document.getElementById('sifre').value == "1234") {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('panel').classList.remove('hidden');
            document.getElementById('baslik').innerText = document.getElementById('sube-secim').value + " ŞUBESİ";
        } else { alert("Hatalı!"); }
    }

    function kaydet() {
        localStorage.setItem('as', document.getElementById('as_stok').value);
        localStorage.setItem('al', document.getElementById('al_stok').value);
        alert("Kaydedildi!");
    }
</script>
</body>
</html>
